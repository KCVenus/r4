<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1e293b"  media="(prefers-color-scheme: dark)" />
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <main class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">◈</span>
    </div>
    <h1 class="auth-title" id="auth-title">Connexion</h1>

    <!-- Inline error banner — hidden by default, shown by showError() -->
    <div id="auth-error" class="auth-error hidden"></div>

    <!-- novalidate: rely on our own JS checks + backend validation,
         avoids the inconsistent native browser tooltips. -->
    <form id="auth-form" novalidate>
      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
          required
          minlength="3"
          maxlength="50"
        />
      </div>

      <!-- Email field is only shown in "register" mode, toggled by setMode(). -->
      <div class="field" id="email-field" style="display:none">
        <label for="email">Email <span class="field-optional">(facultatif)</span></label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          minlength="4"
        />
      </div>

      <button type="submit" id="auth-submit" class="btn-primary auth-btn">
        Se connecter
      </button>
    </form>

    <!-- Toggle link: switches the form between login and register mode. -->
    <p class="auth-toggle">
      <span id="toggle-text">Pas encore de compte ?</span>
      <button id="toggle-btn" class="link-btn">En créer un</button>
    </p>

    <p class="auth-toggle" style="margin-top:0">
      <a href="index.html" class="link-btn">← Continuer sans compte</a>
    </p>
  </main>

  <script>
    /**
     * Login / register inline script.
     *
     * Single form that toggles between login and register mode via setMode().
     * Submits to POST /api/auth with { action: "login"|"register", ... }.
     * On success, redirects to /index.html.
     */
    (function () {
      'use strict';

      var isLoginMode = true; // true = login form, false = register form
      var csrfToken   = '';

      var titleEl    = document.getElementById('auth-title');
      var submitEl   = document.getElementById('auth-submit');
      var toggleText = document.getElementById('toggle-text');
      var toggleBtn  = document.getElementById('toggle-btn');
      var errorEl    = document.getElementById('auth-error');
      var form       = document.getElementById('auth-form');
      var passInput  = document.getElementById('password');

      // Bootstrap: fetch CSRF token, then auto-redirect if a session is already active.
      fetch('api/csrf', { credentials: 'include' })
        .then(function (response) { return response.ok ? response.json() : null; })
        .catch(function ()         { return null; })
        .then(function (data) {
          if (data) csrfToken = data.token;
          return fetch('api/auth', { credentials: 'include' });
        })
        .then(function (response) {
          // Already logged in -> skip the form entirely.
          if (response.ok) window.location.href = 'index.html';
        })
        .catch(function () {});

      /**
       * Swap the form between login and register mode.
       * Updates the button/heading text, autocomplete hints, and email visibility.
       *
       * @param {boolean} login True for login mode, false for register mode.
       */
      function setMode(login) {
        isLoginMode = login;
        titleEl.textContent    = login ? 'Connexion' : 'Créer un compte';
        submitEl.textContent   = login ? 'Se connecter' : 'Créer le compte';
        toggleText.textContent = login ? 'Pas encore de compte ?' : 'Déjà inscrit ?';
        toggleBtn.textContent  = login ? 'En créer un' : 'Se connecter';
        // Tell password managers whether this is an existing or new password field.
        passInput.setAttribute('autocomplete', login ? 'current-password' : 'new-password');
        document.getElementById('email-field').style.display = login ? 'none' : '';
        hideError();
      }

      /**
       * Display a user-facing error message in the banner above the form.
       *
       * @param {string} message Text to show.
       */
      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      }

      /**
       * Clear and hide the error banner (called on mode switch and on retry).
       */
      function hideError() {
        errorEl.classList.add('hidden');
      }

      toggleBtn.addEventListener('click', function () {
        setMode(!isLoginMode);
      });

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        hideError();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        // Empty email -> null so the backend stores a real NULL rather than ''.
        var email    = document.getElementById('email').value.trim() || null;
        var action   = isLoginMode ? 'login' : 'register';

        // Disable the submit button to prevent double-submission races.
        submitEl.disabled    = true;
        submitEl.textContent = isLoginMode ? 'Connexion…' : 'Création…';

        fetch('api/auth', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
          body:        JSON.stringify({ action: action, username: username, password: password, email: email }),
        })
          // Merge the status and body into one object so we can branch on either.
          .then(function (response) {
            return response.json().then(function (data) {
              return { ok: response.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              window.location.href = 'index.html';
            } else {
              showError(result.data.error || 'Une erreur est survenue');
              submitEl.disabled    = false;
              submitEl.textContent = isLoginMode ? 'Se connecter' : 'Créer le compte';
            }
          })
          .catch(function () {
            showError('Erreur réseau — le serveur est-il démarré ?');
            submitEl.disabled    = false;
            submitEl.textContent = isLoginMode ? 'Se connecter' : 'Créer le compte';
          });
      });
    })();
  </script>
</body>
</html>
