<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1e293b"  media="(prefers-color-scheme: dark)" />
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <main class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">◈</span>
    </div>
    <h1 class="auth-title" id="auth-title">Connexion</h1>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="auth-form" novalidate>
      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
          required
          minlength="3"
          maxlength="50"
        />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          minlength="4"
        />
      </div>

      <button type="submit" id="auth-submit" class="btn-primary auth-btn">
        Se connecter
      </button>
    </form>

    <p class="auth-toggle">
      <span id="toggle-text">Pas encore de compte ?</span>
      <button id="toggle-btn" class="link-btn">En créer un</button>
    </p>

    <p class="auth-toggle" style="margin-top:0">
      <a href="index.html" class="link-btn">← Continuer sans compte</a>
    </p>
  </main>

  <script>
    (function () {
      'use strict';

      var isLogin   = true;
      var csrfToken = '';

      var titleEl   = document.getElementById('auth-title');
      var submitEl  = document.getElementById('auth-submit');
      var toggleTxt = document.getElementById('toggle-text');
      var toggleBtn = document.getElementById('toggle-btn');
      var errorEl   = document.getElementById('auth-error');
      var form      = document.getElementById('auth-form');
      var passInput = document.getElementById('password');

      // Récupération du CSRF + vérification connexion existante
      fetch('api/csrf', { credentials: 'include' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function ()  { return null; })
        .then(function (data) {
          if (data) csrfToken = data.token;
          return fetch('api/auth', { credentials: 'include' });
        })
        .then(function (r) {
          if (r.ok) window.location.href = 'index.html';
        })
        .catch(function () {});

      function setMode(login) {
        isLogin = login;
        titleEl.textContent   = login ? 'Connexion' : 'Créer un compte';
        submitEl.textContent  = login ? 'Se connecter' : 'Créer le compte';
        toggleTxt.textContent = login ? 'Pas encore de compte ?' : 'Déjà inscrit ?';
        toggleBtn.textContent = login ? 'En créer un' : 'Se connecter';
        passInput.setAttribute('autocomplete', login ? 'current-password' : 'new-password');
        hideError();
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
      }

      function hideError() {
        errorEl.classList.add('hidden');
      }

      toggleBtn.addEventListener('click', function () {
        setMode(!isLogin);
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var action   = isLogin ? 'login' : 'register';

        submitEl.disabled    = true;
        submitEl.textContent = isLogin ? 'Connexion…' : 'Création…';

        fetch('api/auth', {
          method:      'POST',
          credentials: 'include',
          headers:     { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
          body:        JSON.stringify({ action: action, username: username, password: password }),
        })
          .then(function (r) {
            return r.json().then(function (data) {
              return { ok: r.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              window.location.href = 'index.html';
            } else {
              showError(result.data.error || 'Une erreur est survenue');
              submitEl.disabled    = false;
              submitEl.textContent = isLogin ? 'Se connecter' : 'Créer le compte';
            }
          })
          .catch(function () {
            showError('Erreur réseau — le serveur est-il démarré ?');
            submitEl.disabled    = false;
            submitEl.textContent = isLogin ? 'Se connecter' : 'Créer le compte';
          });
      });
    })();
  </script>
</body>
</html>
