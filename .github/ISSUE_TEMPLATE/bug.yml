name: Bug
description: Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Decrire le bug clairement
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Etapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Voir l'erreur
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportement observe
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environnement
      placeholder: "Navigateur, OS, version PHP, MySQL..."
